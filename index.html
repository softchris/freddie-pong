<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Freddie Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      color: #e6edf3;
      user-select: none;
      touch-action: manipulation;
    }

    #gameCanvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }


    /* ---- HUD ---- */
    #hud {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      padding: 20px 28px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      pointer-events: none;
      z-index: 10;
    }
    #scoreDisplay {
      font-size: 32px;
      font-weight: 700;
      color: #e6edf3;
      text-shadow: 0 2px 8px rgba(0,0,0,.6);
      letter-spacing: 2px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .score-p1 { color: #58a6ff; }
    .score-p2 { color: #bc8cff; }
    .score-sep { color: #30363d; font-weight: 400; }

    #modeIndicator {
      position: fixed;
      top: 20px;
      right: 28px;
      font-size: 13px;
      color: #8b949e;
      pointer-events: none;
      z-index: 10;
    }

    /* ---- Start overlay ---- */
    #overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      background: rgba(13,17,23,.75);
      backdrop-filter: blur(6px);
      transition: opacity .4s;
    }
    #overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }

    #title {
      font-size: 52px;
      font-weight: 800;
      letter-spacing: -1px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #9be9a8, #216e39);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #subtitle {
      font-size: 18px;
      color: #8b949e;
      margin-bottom: 32px;
    }

    #controlHint {
      font-size: 14px;
      color: #58a6ff;
      margin-bottom: 8px;
    }

    #startHint {
      margin-top: 24px;
      font-size: 16px;
      color: #8b949e;
      animation: pulse 2s ease-in-out infinite;
    }
    #startHint kbd {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 6px;
      border: 1px solid #30363d;
      background: #21262d;
      font-family: inherit;
      font-size: 14px;
      color: #e6edf3;
      box-shadow: inset 0 -1px 0 #30363d;
    }

    #cameraHint {
      margin-top: 12px;
      font-size: 13px;
      color: #484f58;
    }

    @keyframes pulse {
      0%, 100% { opacity: .6; }
      50% { opacity: 1; }
    }

    /* ---- Calibration ---- */
    #calibrationOverlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 25;
      background: rgba(13,17,23,.85);
      backdrop-filter: blur(8px);
      transition: opacity .4s;
    }
    #calibrationOverlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    #calibTitle {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #f0c040, #d4a017);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    #calibSubtitle {
      font-size: 16px;
      color: #8b949e;
      margin-bottom: 28px;
    }
    #calibStep {
      font-size: 52px;
      font-weight: 900;
      margin-bottom: 12px;
      min-height: 70px;
    }
    #calibStep.ay { color: #3fb950; }
    #calibStep.eh { color: #f85149; }
    #calibStep.done { color: #f0c040; }
    #calibStatus {
      font-size: 18px;
      color: #e6edf3;
      margin-bottom: 16px;
      min-height: 28px;
    }
    #calibMeter {
      width: 300px;
      height: 8px;
      border-radius: 4px;
      background: #21262d;
      overflow: hidden;
      margin-bottom: 16px;
    }
    #calibMeterFill {
      height: 100%;
      width: 0%;
      border-radius: 4px;
      background: #d4a017;
      transition: width 0.05s linear;
    }
    #calibMeterFill.recording { background: #3fb950; }
    #calibHint {
      font-size: 14px;
      color: #484f58;
      animation: pulse 2s ease-in-out infinite;
    }
    #calibMicRow {
      font-size: 14px;
      color: #8b949e;
      margin-bottom: 20px;
    }
    #calibMicRow select {
      padding: 6px 10px;
      font-size: 13px;
      color: #e6edf3;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      margin-left: 8px;
      max-width: 300px;
    }
    #calibMicRow select:focus { border-color: #d4a017; }

    /* ---- Game Over ---- */
    #gameOver {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      background: rgba(13,17,23,.8);
      backdrop-filter: blur(8px);
      opacity: 0;
      pointer-events: none;
      transition: opacity .5s;
    }
    #gameOver.visible {
      opacity: 1;
      pointer-events: auto;
    }
    #gameOverTitle {
      font-size: 48px;
      font-weight: 800;
      margin-bottom: 12px;
    }
    #gameOverTitle.p1-win {
      color: #58a6ff;
    }
    #gameOverTitle.p2-win {
      color: #bc8cff;
    }
    #finalScore {
      font-size: 24px;
      color: #8b949e;
      margin-bottom: 24px;
    }
    #restartHint {
      font-size: 16px;
      color: #8b949e;
      animation: pulse 2s ease-in-out infinite;
    }

    /* ---- Score flash ---- */
    .score-flash {
      animation: scoreFlash 0.6s ease-out;
    }
    @keyframes scoreFlash {
      0% { transform: scale(1.5); }
      100% { transform: scale(1); }
    }


    /* ---- Voice indicator (Freddie mode 🎤) ---- */
    #voiceIndicator {
      position: fixed;
      bottom: 16px;
      left: 16px;
      font-size: 14px;
      color: #8b949e;
      z-index: 10;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid #30363d;
      background: rgba(22, 27, 34, 0.85);
      transition: all 0.3s ease;
      font-weight: 500;
      min-width: 220px;
    }
    #voiceIndicator.active {
      border-color: #d4a017;
      color: #f0c040;
    }
    #voiceIndicator.voice-up {
      border-color: #3fb950;
      color: #3fb950;
      box-shadow: 0 0 12px rgba(63, 185, 80, 0.4);
      text-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
    }
    #voiceIndicator.voice-down {
      border-color: #da3633;
      color: #f85149;
      box-shadow: 0 0 12px rgba(248, 81, 73, 0.4);
      text-shadow: 0 0 8px rgba(248, 81, 73, 0.5);
    }
    #micSelect {
      display: block;
      width: 100%;
      margin-top: 6px;
      padding: 4px 6px;
      font-size: 11px;
      color: #e6edf3;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 6px;
      outline: none;
      cursor: pointer;
      pointer-events: auto;
    }
    #micSelect:focus { border-color: #d4a017; }
    #voiceMeter {
      height: 4px;
      margin-top: 6px;
      border-radius: 2px;
      background: #21262d;
      overflow: hidden;
    }
    #voiceMeterFill {
      height: 100%;
      width: 0%;
      border-radius: 2px;
      background: #d4a017;
      transition: width 0.05s linear, background 0.15s;
    }
    #voiceMeterFill.loud { background: #3fb950; }

    /* ---- Voice match flash ---- */
    #voiceFlash {
      position: fixed;
      top: 50%;
      left: 28px;
      transform: translateY(-50%);
      font-size: 48px;
      font-weight: 900;
      pointer-events: none;
      z-index: 15;
      opacity: 0;
      transition: opacity 0.15s ease-out;
      text-shadow: 0 0 24px currentColor, 0 0 48px currentColor;
      letter-spacing: 2px;
    }
    #voiceFlash.show-up {
      opacity: 1;
      color: #3fb950;
    }
    #voiceFlash.show-down {
      opacity: 1;
      color: #f85149;
    }
  </style>
</head>
<body>

  <canvas id="gameCanvas"></canvas>

  <div id="hud">
    <div id="scoreDisplay">
      <span class="score-p1" id="p1Score">0</span>
      <span class="score-sep">—</span>
      <span class="score-p2" id="p2Score">0</span>
    </div>
  </div>
  <div id="modeIndicator">Voice Control</div>

  <div id="overlay">
    <div id="title">Freddie Pong</div>
    <div id="subtitle">3D · Voice-Controlled · Ay‑OH! Edition 🎤</div>
    <div id="controlHint">🎤 Sing high <b>Ay‑OH!</b> = UP · Sing low <b>Eh‑OH!</b> = DOWN</div>
    <div id="startHint">Waiting for mic…</div>
    <div id="cameraHint">Allow microphone access to play</div>
  </div>

  <div id="calibrationOverlay" class="hidden">
    <div id="calibTitle">🎤 Voice Calibration</div>
    <div id="calibSubtitle">Teach the game YOUR voice</div>
    <div id="calibMicRow">Select mic: <select id="micSelect"><option>Loading devices…</option></select></div>
    <div id="calibStep"></div>
    <div id="calibStatus"></div>
    <div id="calibMeter"><div id="calibMeterFill"></div></div>
    <div id="calibHint"></div>
  </div>

  <div id="gameOver">
    <div id="gameOverTitle">Game Over</div>
    <div id="finalScore"></div>
    <div id="restartHint">Tap or press <kbd>SPACE</kbd> to play again</div>
  </div>

  <div id="voiceIndicator">🎤 Initializing mic…<div id="voiceMeter"><div id="voiceMeterFill"></div></div></div>
  <div id="voiceFlash"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script type="module" src="game.js"></script>

</body>
</html>
